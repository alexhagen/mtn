name: MTN
options:
  bundleIdPrefix: com.mtn
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  developmentLanguage: en

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.7"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MTN-iOS:
    type: application
    platform: iOS
    sources:
      - MTN
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtn.app
        INFOPLIST_FILE: MTN/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: "\"MTN/Preview Content\""
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    scheme:
      testTargets:
        - MTNTests-iOS
      gatherCoverageData: true

  MTN-macOS:
    type: application
    platform: macOS
    sources:
      - MTN
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtn.app
        INFOPLIST_FILE: MTN/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: "\"MTN/Preview Content\""
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    scheme:
      testTargets:
        - MTNTests-macOS
      gatherCoverageData: true

  MTNTests-iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MTNTests
    dependencies:
      - target: MTN-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtn.tests

  MTNTests-macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - MTNTests
    dependencies:
      - target: MTN-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtn.tests

# No external Swift packages required.
# Supabase integration uses URLSession REST API directly for Swift 5.7 / Xcode 14 compatibility.
