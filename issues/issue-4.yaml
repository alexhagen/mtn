title: Complete Test Coverage to 95%
status: in-progress
priority: medium
created: 2026-03-27
updated: 2026-03-27

description: |
  Achieve 95% test coverage for the MTN project service layer by fixing remaining
  test issues and ensuring all service logic is properly tested.

progress:
  completed:
    - Updated vitest.config.ts to exclude UI/config files from coverage
    - Added fake-indexeddb package for IndexedDB testing
    - Created 8 new test files for service layer coverage
    - Implemented tests for RSS parsing, storage backends, readability service
    - Core service tests (encryption, agent, generation pipeline) are passing
  
  remaining:
    - Fix Supabase storage backend mock issues
    - Verify 95% coverage is achieved on service layer
    - Run final coverage report

test_files_created:
  - src/services/__tests__/supabase-client.test.ts
  - src/services/__tests__/rss-branches.test.ts
  - src/services/__tests__/storage-index.test.ts
  - src/services/__tests__/supabase-storage.test.ts
  - src/services/__tests__/local-storage-full.test.ts
  - src/services/__tests__/readability-branches.test.ts

next_steps:
  1_fix_supabase_mocks:
    description: Fix Supabase storage backend test mocks
    details: |
      The Supabase storage tests in supabase-storage.test.ts need mock refinement
      to properly chain method calls. The test structure is correct, but the mock
      setup needs to match the exact Supabase query builder pattern.
      
      Current issues:
      - Method chaining on Supabase client queries not properly mocked
      - Some tests expect errors to be thrown but fallback logic catches them
      
      Solution:
      - Review actual Supabase query builder API
      - Update mocks to return proper chainable objects
      - Ensure all .eq(), .select(), .from() calls return mockReturnThis()
      - Test both success and error paths for each method
    
    files_to_fix:
      - src/services/__tests__/supabase-storage.test.ts
    
    estimated_effort: 1-2 hours

  2_verify_coverage:
    description: Run coverage report and verify 95% threshold
    command: npm run test:coverage
    success_criteria: |
      - All test files passing
      - Statements: >= 95%
      - Branches: >= 95%
      - Functions: >= 95%
      - Lines: >= 95%
    
    estimated_effort: 15 minutes

  3_document_coverage:
    description: Update TEST_GUIDE.md with coverage information
    details: |
      Document the coverage strategy:
      - Which files are excluded and why
      - How to run coverage reports
      - Coverage thresholds and rationale
      - How to add new tests
    
    estimated_effort: 30 minutes

coverage_strategy:
  excluded_from_coverage:
    - src/main.tsx (entry point)
    - src/types/** (type definitions)
    - src/test/** (test utilities)
    - src/theme.ts (pure config)
    - src/App.tsx (UI component)
    - src/routes/** (UI components - covered by Cypress e2e)
    - src/components/MarkdownRenderer.tsx (UI component)
    - src/components/SignInDialog.tsx (UI component)
    - src/contexts/** (React contexts - covered by Cypress e2e)
  
  included_in_coverage:
    - src/services/** (all service layer logic)
    - src/components/TopicTabs.tsx (simple component with logic)
  
  rationale: |
    Focus unit test coverage on service layer (pure logic, easy to test).
    UI components are covered by Cypress e2e tests which provide integration
    testing. This approach:
    - Avoids complex React component mocking
    - Focuses on business logic coverage
    - Maintains fast unit test execution
    - Provides better ROI on testing effort

dependencies:
  - fake-indexeddb: ^5.0.2 (installed)
  - vitest: ^3.2.4
  - @testing-library/react: (existing)
  - @testing-library/jest-dom: (existing)

notes: |
  The service layer tests are well-structured and comprehensive. Once the
  Supabase mocking issues are resolved, the project should easily exceed
  95% coverage on all service code. The exclusion of UI components from
  unit test coverage is intentional and appropriate given the Cypress e2e
  test suite.
