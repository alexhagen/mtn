title: "RFC: Deepen Generation Pipeline Module"
labels:
  - enhancement
  - architecture
priority: HIGH
body: |
  ## Problem

The AI generation pipeline is fragmented across route components, \`agent.ts\`, and content parsing logic, creating architectural friction:

- **Shallow modules**: \`generateDailySummary()\` and \`generateBookRecommendations()\` in \`agent.ts\` duplicate ~80% of their streaming logic (SSE event parsing, tool extraction, cost calculation)
- **Tight coupling**: Route components (\`DailySummary.tsx\`, \`Books.tsx\`) orchestrate the entire flow: RSS fetch → filter → agent call → content parsing → persistence
- **Integration risk**: The orchestration logic (~60 lines in \`DailySummary.tsx\`) is completely untested — this is the **riskiest untested area** in the codebase
- **Hard to navigate**: Understanding the generation flow requires bouncing between 3-4 files

## Proposed Interface

**Design A3: Optimized for Common Case** — Makes the 90% use case (daily summaries) trivial while supporting book recommendations.

\`\`\`typescript
interface GenerationPipeline {
  generate(request: GenerationRequest): Promise<GenerationResult>;
}

type GenerationRequest = 
  | DailySummaryRequest 
  | BookRecommendationsRequest;

interface DailySummaryRequest {
  type: 'daily-summary';
  topicName: string;
  articles: RSSFeedItem[];
  onProgress?: ProgressCallback;
}

interface BookRecommendationsRequest {
  type: 'book-recommendations';
  topics: string[];
  onProgress?: ProgressCallback;
}

interface GenerationResult {
  content: string;
  cost: CostEstimate;
  metadata: { generatedAt: number; model: string };
}
\`\`\`

**Usage**:
\`\`\`typescript
// Before: ~60 lines of orchestration in DailySummary.tsx
const allArticles = await fetchMultipleFeeds(topic.rssFeeds, settings.corsProxyUrl);
const recentArticles = filterArticlesByDate(allArticles, 24);
const result = await generateDailySummary(topic.name, recentArticles, {...});
const newSummary = { id: generateId(), topicId: topic.id, ... };
await saveSummary(newSummary);

// After: Single call
const result = await pipeline.generate({
  type: 'daily-summary',
  topicName: topic.name,
  articles: recentArticles,
  onProgress: setProgress
});
\`\`\`

**What it hides**:
- Streaming protocol parsing (SSE events → tool arguments)
- Tool extraction (\`finalize_summary\` / \`finalize_recommendations\`)
- Content parsing (markdown → structured books)
- Cost calculation
- Error handling for streaming failures

## Dependency Strategy

**Category**: True external (Anthropic SDK) + in-process composition

- **Anthropic SDK**: Injected as constructor parameter, mockable for tests
- **Content parsing**: Pure functions (markdown → structured data) extracted from \`Books.tsx\`
- **Streaming logic**: Unified implementation shared by both generation types

**Testing approach**:
\`\`\`typescript
// Mock the Anthropic SDK
const mockAnthropic = {
  messages: {
    stream: async () => mockStreamWithToolUse('finalize_summary', { summary: '...' })
  }
};

const pipeline = new GenerationPipeline(mockAnthropic, config);
const result = await pipeline.generate({
  type: 'daily-summary',
  topicName: 'AI',
  articles: mockArticles
});

expect(result.content).toContain('...');
expect(result.cost.estimatedCost).toBeGreaterThan(0);
\`\`\`

## Testing Strategy

**New boundary tests to write**:
1. \`generateDailySummary_withValidArticles_returnsStructuredSummary\`
2. \`generateDailySummary_withStreamingProgress_callsProgressCallback\`
3. \`generateBookRecommendations_withTopics_returnsStructuredBooks\`
4. \`generate_withToolUseFailure_throwsError\`
5. \`generate_calculatesCorrectCost_forDifferentModels\`

**Old tests to delete**:
- None currently exist — this is untested code

**Test environment needs**:
- Mock Anthropic SDK with controllable SSE stream
- Fixture data for RSS articles and expected outputs

## Implementation Recommendations

**What the module should own**:
- Streaming protocol parsing (all SSE event types)
- Tool schema definitions and extraction
- Content parsing (markdown → structured data)
- Cost calculation with model pricing table
- Progress event emission

**What it should hide**:
- Anthropic SDK implementation details
- Streaming event buffering and state management
- Tool argument JSON parsing
- Model-specific pricing logic

**What it should expose**:
- Single \`generate()\` method with discriminated union request types
- Progress callback for UI updates
- Structured result with content + cost + metadata

**How callers should migrate**:
1. Replace orchestration code in \`DailySummary.tsx\` with single \`pipeline.generate()\` call
2. Replace orchestration code in \`Books.tsx\` with single \`pipeline.generate()\` call
3. Remove \`parseBookRecommendations()\` from \`Books.tsx\` (now internal to pipeline)
4. Keep \`generateDailySummary()\` and \`generateBookRecommendations()\` as deprecated wrappers initially
5. Delete deprecated wrappers once all callers migrated

---

  **Priority**: HIGH — This addresses the riskiest untested code and the most significant architectural friction.

  See `ARCHITECTURE_IMPROVEMENTS.md` for alternative designs and full analysis.
