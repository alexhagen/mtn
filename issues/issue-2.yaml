title: "RFC: Consolidate Article Save Logic with Ports & Adapters"
labels:
  - enhancement
  - architecture
priority: MEDIUM
body: |
  ## Problem

  Article save logic is duplicated across `DailySummary.tsx` and `ReadingList.tsx` with different enforcement rules, creating architectural friction:

  - **Shallow modules**: Both routes have nearly identical `handleSaveArticle()` functions that duplicate: extract content via Readability → check limit → construct Article → persist → confirm
  - **Tight coupling**: The Readability extraction calls a CORS proxy (remote but owned), but this cross-boundary dependency isn't abstracted
  - **Integration risk**: The limit enforcement logic (4 articles vs 12,000 words) is reimplemented in each route with slight variations
  - **Hard to test**: Testing article save requires rendering React components and mocking the CORS proxy

  ## Proposed Interface

  **Design B1: Ports & Adapters** — Define ports for cross-boundary dependencies (Readability extraction via CORS proxy).

  ```typescript
  // Port: Content extraction abstraction
  interface ContentExtractor {
    extractArticle(url: string): Promise<ExtractedArticle>;
  }

  interface ExtractedArticle {
    title: string;
    content: string;
    textContent: string;
    wordCount: number;
  }

  // Port: Limit enforcement strategy
  interface ArticleLimitPolicy {
    canSave(article: ExtractedArticle): Promise<LimitCheckResult>;
  }

  interface LimitCheckResult {
    allowed: boolean;
    reason?: string;
    currentUsage?: { count: number; limit: number } | { words: number; limit: number };
  }

  // Main service interface
  interface ArticleSaveService {
    saveArticle(url: string, title?: string, topicId?: string): Promise<SaveResult>;
  }

  interface SaveResult {
    success: boolean;
    error?: string;
    article?: Article;
    usage?: { count: number; limit: number } | { words: number; limit: number };
  }
  ```

  **Adapters**:
  ```typescript
  // Production: Real CORS proxy
  class ReadabilityContentExtractor implements ContentExtractor {
    constructor(private corsProxyUrl: string) {}
    async extractArticle(url: string): Promise<ExtractedArticle> {
      return extractArticleContent(url, this.corsProxyUrl);
    }
  }

  // Test: Mock extractor
  class MockContentExtractor implements ContentExtractor {
    async extractArticle(url: string): Promise<ExtractedArticle> {
      return { title: 'Test', content: '<p>Test</p>', textContent: 'Test', wordCount: 1 };
    }
  }

  // Limit policies
  class ArticleCountPolicy implements ArticleLimitPolicy {
    constructor(private maxArticles: number) {}
    async canSave(article: ExtractedArticle): Promise<LimitCheckResult> {
      const current = await getArticlesByMonth(getMonthKey());
      return {
        allowed: current.length < this.maxArticles,
        reason: current.length >= this.maxArticles ? `Limit reached (${this.maxArticles})` : undefined,
        currentUsage: { count: current.length, limit: this.maxArticles }
      };
    }
  }

  class WordBudgetPolicy implements ArticleLimitPolicy {
    constructor(private maxWords: number) {}
    async canSave(article: ExtractedArticle): Promise<LimitCheckResult> {
      const current = await getArticlesByMonth(getMonthKey());
      const totalWords = current.reduce((sum, a) => sum + a.wordCount, 0);
      return {
        allowed: totalWords + article.wordCount <= this.maxWords,
        reason: totalWords + article.wordCount > this.maxWords 
          ? `Would exceed ${this.maxWords} word limit` 
          : undefined,
        currentUsage: { words: totalWords, limit: this.maxWords }
      };
    }
  }
  ```

  **Usage**:
  ```typescript
  // In DailySummary.tsx
  const saver = new ArticleSaveService(
    new ReadabilityContentExtractor(settings.corsProxyUrl),
    new ArticleCountPolicy(4),
    storage
  );
  const result = await saver.saveArticle(url, title, topicId);

  // In ReadingList.tsx
  const saver = new ArticleSaveService(
    new ReadabilityContentExtractor(settings.corsProxyUrl),
    new WordBudgetPolicy(12000),
    storage
  );
  const result = await saver.saveArticle(url, title, topicId);
  ```

  **What it hides**:
  - Content extraction
  - Limit checking
  - Article object construction
  - Persistence
  - Error handling

  ## Dependency Strategy

  **Category**: Remote but owned (CORS proxy) + in-process composition

  - **ContentExtractor port**: Abstracts the CORS proxy boundary
    - Production adapter: `ReadabilityContentExtractor` calls real proxy
    - Test adapter: `MockContentExtractor` returns fixture data
  - **ArticleLimitPolicy port**: Abstracts limit enforcement
    - `ArticleCountPolicy`: Enforces 4-article limit
    - `WordBudgetPolicy`: Enforces 12,000-word budget
  - **Storage**: In-process dependency, injected

  **Testing approach**:
  ```typescript
  // Test with mock extractor
  const mockExtractor = new MockContentExtractor();
  const policy = new ArticleCountPolicy(4);
  const saver = new ArticleSaveService(mockExtractor, policy, mockStorage);

  const result = await saver.saveArticle('https://example.com/article');
  
  expect(result.success).toBe(true);
  expect(result.article?.wordCount).toBe(1);
  expect(mockStorage.saveArticle).toHaveBeenCalled();
  ```

  ## Testing Strategy

  **New boundary tests to write**:
  1. `saveArticle_withValidUrl_extractsAndSaves`
  2. `saveArticle_atCountLimit_rejectsWithError`
  3. `saveArticle_atWordLimit_rejectsWithError`
  4. `saveArticle_withExtractionFailure_returnsError`
  5. `ArticleCountPolicy_checksCurrentMonthOnly`
  6. `WordBudgetPolicy_sumsWordCountsCorrectly`

  **Old tests to delete**:
  - None currently exist — this is untested code

  **Test environment needs**:
  - Mock `ContentExtractor` for fast tests
  - Mock storage backend
  - Fixture articles with known word counts

  ## Implementation Recommendations

  **What the module should own**:
  - Content extraction abstraction (port)
  - Limit enforcement strategies (policies)
  - Article object construction
  - Save orchestration (extract → check → persist)
  - Error handling and result formatting

  **What it should hide**:
  - CORS proxy implementation details
  - Readability parsing internals
  - Storage backend details
  - Month key generation

  **What it should expose**:
  - `ContentExtractor` port (for adapters)
  - `ArticleLimitPolicy` port (for policies)
  - `ArticleSaveService` with single `saveArticle()` method
  - `SaveResult` with success/error/usage info

  **How callers should migrate**:
  1. Create `ArticleSaveService` instance with appropriate policy in each route
  2. Replace `handleSaveArticle()` logic with single `saver.saveArticle()` call
  3. Remove duplicated extraction and limit-checking code
  4. Keep existing snackbar/UI feedback logic (uses `SaveResult`)

  ---

  **Priority**: MEDIUM — Reduces duplication and improves testability, but less critical than Group A (Generation Pipeline).

  See `ARCHITECTURE_IMPROVEMENTS.md` for alternative designs and full analysis.
