name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-contracts:
    name: Validate Contract Files
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate JSON contracts
        run: |
          echo "Validating contract JSON files..."
          for file in contracts/*.json; do
            echo "Checking $file"
            if ! jq empty "$file" 2>/dev/null; then
              echo "❌ Invalid JSON in $file"
              exit 1
            fi
          done
          echo "✅ All contract files are valid JSON"
      
      - name: Check contract coverage
        run: |
          echo "Checking that all contracts are tested on both platforms..."
          # List all contract files
          contracts=$(ls contracts/*.json | xargs -n1 basename | sed 's/.json$//')
          
          # Check TypeScript tests
          for contract in $contracts; do
            if ! grep -q "$contract" src/services/__tests__/contracts.test.ts; then
              echo "❌ Contract $contract not tested in TypeScript"
              exit 1
            fi
          done
          
          # Check Swift tests
          for contract in $contracts; do
            if ! grep -q "$contract" apple/MTNTests/ContractTests.swift; then
              echo "❌ Contract $contract not tested in Swift"
              exit 1
            fi
          done
          
          echo "✅ All contracts are tested on both platforms"

  test-web:
    name: Web App Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests with coverage
        run: npm run test:coverage
      
      - name: Build
        run: npm run build
      
      - name: Run E2E tests
        run: npm run test:e2e
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: web
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Vitest Coverage Report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

  test-swift:
    name: Swift App Tests
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer
      
      - name: Install XcodeGen
        run: brew install xcodegen
      
      - name: Generate Xcode project
        run: cd apple && xcodegen generate
      
      - name: Run tests (macOS)
        run: |
          cd apple
          xcodebuild test \
            -scheme MTN-macOS \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult
      
      - name: Extract coverage
        run: |
          cd apple
          xcrun xccov view --report --json TestResults.xcresult > coverage.json
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apple/coverage.json
          flags: swift
          token: ${{ secrets.CODECOV_TOKEN }}
